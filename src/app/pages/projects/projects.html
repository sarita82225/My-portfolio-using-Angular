
<div class="projects-container">
  <h1>Projects</h1>

  <div class="card-grid">
    <div class="card" *ngFor="let project of projects">
      <!--<img [src]="project.image" alt="project">-->
      <h3>{{ project.title }}</h3>
      <p>{{ project.description }}</p>
       <a [href]="project.github" target="_blank">
    View on GitHub
  </a>
    </div>
  </div>
</div>
